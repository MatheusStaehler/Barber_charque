{% extends 'base.html' %}
{% block title %}Cadastro – Barber Charque{% endblock %}

{% block content %}
<div class="form-card">
  <h2 class="form-title">Criar conta</h2>
  <form method="POST" action="{{ url_for('cadastro') }}">
    <div class="form-group">
      <label for="nome">Nome completo</label>
      <input type="text" id="nome" name="nome" placeholder="Seu nome" required>
    </div>
    <div class="form-group">
      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" name="telefone" placeholder="Ex: 51999999999" required>
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="Escolha uma senha" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Cadastrar</button>
  </form>
  <p class="form-footer">Já tem conta? <a href="{{ url_for('login') }}">Entrar</a></p>
</div>
{% endblock %}
