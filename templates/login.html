{% extends 'base.html' %}
{% block title %}Login – Barber Charque{% endblock %}

{% block content %}
<div class="form-card">
  <h2 class="form-title">Entrar na conta</h2>
  <form method="POST" action="{{ url_for('login') }}">
    <div class="form-group">
      <label for="telefone">Telefone</label>
      <input type="tel" id="telefone" name="telefone" placeholder="Ex: 51999999999" required>
    </div>
    <div class="form-group">
      <label for="senha">Senha</label>
      <input type="password" id="senha" name="senha" placeholder="Sua senha" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Entrar</button>
  </form>
  <p class="form-footer">Não tem conta? <a href="{{ url_for('cadastro') }}">Cadastre-se</a></p>
</div>
{% endblock %}
